name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1

  qgis-plugin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build plugin zip
        run: |
          cd qgis_plugin
          zip -r ../qgis_bridge.zip . -x '__pycache__/*' '*.pyc'
          cd ..
          python3 -c "
          import zipfile
          with zipfile.ZipFile('qgis_bridge.zip', 'r') as zin:
              with zipfile.ZipFile('qgis_bridge_plugin.zip', 'w') as zout:
                  for item in zin.infolist():
                      data = zin.read(item.filename)
                      item.filename = 'qgis_bridge/' + item.filename
                      zout.writestr(item, data)
          "
      - name: Attach to release
        run: gh release upload "${{ github.event.release.tag_name }}" qgis_bridge_plugin.zip
        env:
          GH_TOKEN: ${{ github.token }}
